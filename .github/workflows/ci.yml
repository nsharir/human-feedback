name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [18.x, 20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run compile:examples

      - name: Verify built templates are committed
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '20.x'
        run: |
          git diff --exit-code lib/templates/ || (
            echo "::error::Built templates are out of sync with sources. Run 'npm run build' and commit."
            exit 1
          )
